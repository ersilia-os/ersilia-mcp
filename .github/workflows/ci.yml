name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-slim
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up conda
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install poetry and dependencies
        run: |
          pip install poetry
          poetry install --all-extras
      - name: Run unit tests
        run: poetry run pytest -v -m "not integration"
      - name: Lint with ruff
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

  integration:
    defaults:
      run:
        shell: bash -el {0}
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Set up conda
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5
        with:
          python-version: "3.12"
      - name: Install poetry and dependencies
        run: |
          pip install poetry
          poetry install --all-extras
      - name: Run integration tests
        run: poetry run pytest -v -m integration
