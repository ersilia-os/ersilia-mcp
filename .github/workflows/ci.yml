name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up conda
        uses: conda-incubator/setup-miniconda@a4260408e4b67c9018a00b9a53d6cda77dc0caee
        with:
          python-version: ${{ matrix.python-version }}
          auto-activate-base: true
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -v -m "not integration"
      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

  integration:
    runs-on: ubuntu-slim
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up conda
        uses: conda-incubator/setup-miniconda@a4260408e4b67c9018a00b9a53d6cda77dc0caee
        with:
          python-version: "3.12"
          auto-activate-base: true
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -v -m integration
